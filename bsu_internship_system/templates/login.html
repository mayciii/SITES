<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sign In — BatStateU-TNEU Lipa SITES</title>
<link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">

    <!-- Logo row -->
    <div class="auth-logo-row">
      <div class="auth-logo-badge">
        <svg viewBox="0 0 24 24"><path d="M3 21h18"/><path d="M5 21V7l7-4 7 4v14"/><path d="M9 21v-4a3 3 0 016 0v4"/></svg>
      </div>
      <div class="auth-logo-text">
        <div class="alo-name">Batangas State University The National Engineering University - Lipa Campus</div>
        <div class="alo-sub">Student Internship Tracking &amp; Evaluation System</div>
      </div>
    </div>

    <!-- Heading -->
    <div class="auth-head">
      <h2>Welcome back</h2>
      <p>Sign in to access your account</p>
    </div>

    <!-- Error box -->
    <div id="errBox" class="al al-err" style="display:none;">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
      <span id="errMsg"></span>
    </div>

    <!-- Form -->
    <form id="loginForm" novalidate>
      <div class="fg">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="Enter your email address" required/>
      </div>
      <div class="fg">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password" required/>
      </div>
      <button type="submit" class="btn btn-p btn-w" id="loginBtn" style="margin-top:.5rem;">
        <svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Sign In
      </button>
    </form>

    <div class="auth-foot">Don't have an account? <a href="/register">Create one here</a></div>

  </div>
</div>

<script src="/static/js/api.js"></script>
<script>
document.getElementById("loginForm").addEventListener("submit", async e => {
  e.preventDefault();
  const btn = document.getElementById("loginBtn"), eb = document.getElementById("errBox");
  eb.style.display = "none";
  btn.disabled = true;
  btn.innerHTML = '<svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2;animation:spin .7s linear infinite"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg> Signing in...';
  if (!document.getElementById('_spinStyle')) {
    const s = document.createElement('style'); s.id = '_spinStyle';
    s.textContent = '@keyframes spin{to{transform:rotate(360deg)}}';
    document.head.appendChild(s);
  }
  try {
    const d = await API.post("/auth/login", {
      email: document.getElementById("email").value.trim(),
      password: document.getElementById("password").value
    });
    Session.set(d.user);
    const r = d.user.role;
    location.href = r === "admin" ? "/admin_dashboard" : r === "facilitator" ? "/facilitator_dashboard" : "/dashboard";
  } catch(e) {
    document.getElementById("errMsg").textContent = e.message;
    eb.style.display = "flex";
    btn.disabled = false;
    btn.innerHTML = '<svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2;"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Sign In';
  }
});
</script>
</body>
</html>
